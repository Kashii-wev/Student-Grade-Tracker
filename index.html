<!DOCTYPE html>
<html lang="en">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grade Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
 
<body>
    <header>
        <h1>Student Grade Tracker</h1>
    </header>
 
    <main class="layout">
        <section id="content">
            <h2 id="addstu">Add Student</h2>
            <div class="list">
                <label for="name">Student Name</label>
                <input type="text" id="name" placeholder="Enter the name">
 
                <label for="marks">Student Marks</label>
                <input type="number" id="marks" placeholder="Enter the marks (0-100)" min="0" max="100">
 
                <div id="container">
                    <button id="btn" onclick="addstudent()">Add Student</button>
                </div>
            </div>
        </section>
 
        <!-- Output -->
        <section id="container2">
            <div id="tb">
                <table id="table">
                    <thead id="thead">
                        <tr id="tr">
                            <th>Name</th>
                            <th>Marks</th>
                            <th>Grade</th>
                        </tr>
                    </thead>
                    <tbody id="tbody">
                    </tbody>
                </table>
            </div>
 
            <div id="stu">
                <h3 id="avg">Average Marks</h3>
            </div>
 
            <div id="stu1">
                <h3 id="topscore">Top Score</h3>
            </div>
 
            <div id="clear">
                <button onclick="clearAll()">Clear All Data</button>
            </div>
        </section>
    </main>
 
    <script src="script.js"></script>
</body>
 
</html>
